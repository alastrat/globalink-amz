name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push NanoClaw
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nanoclaw.Dockerfile
          push: true
          tags: |
            ghcr.io/alastrat/globalink-amz/nanoclaw:${{ github.sha }}
            ghcr.io/alastrat/globalink-amz/nanoclaw:latest

      - name: Build and push Inngest worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/inngest-worker.Dockerfile
          push: true
          tags: |
            ghcr.io/alastrat/globalink-amz/inngest-worker:${{ github.sha }}
            ghcr.io/alastrat/globalink-amz/inngest-worker:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          SCP="scp -i ~/.ssh/deploy_key"
          HOST="root@${{ secrets.VPS_HOST }}"

          # Sync docker-compose.yml to deploy directory
          $SCP docker-compose.yml ${HOST}:/opt/globalink-fba/

          # Sync business config (CLAUDE.md) to NanoClaw groups
          $SCP config/CLAUDE.md ${HOST}:/opt/nanoclaw/groups/owner/CLAUDE.md

          # Sync Python tools (skip .env which has secrets)
          $SCP tools/*.py ${HOST}:/opt/nanoclaw/groups/owner/tools/

          # Sync Inngest worker source
          $SCP inngest/worker/lib/*.js ${HOST}:/opt/inngest/worker/lib/ 2>/dev/null || true
          $SCP inngest/worker/functions/*.js ${HOST}:/opt/inngest/worker/functions/ 2>/dev/null || true

      - name: Deploy containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Stop legacy services (systemd → Docker transition)
            systemctl stop nanoclaw.service 2>/dev/null || true
            systemctl disable nanoclaw.service 2>/dev/null || true
            cd /opt/inngest && docker compose down 2>/dev/null || true
            systemctl stop inngest.service 2>/dev/null || true
            systemctl disable inngest.service 2>/dev/null || true

            # Deploy unified Docker stack
            cd /opt/globalink-fba
            docker compose pull nanoclaw inngest-worker
            docker compose up -d --remove-orphans
            docker image prune -f

            # Verify containers are running
            sleep 5
            RUNNING=$(docker compose ps --format json | grep -c '"running"' || true)
            if [ "$RUNNING" -lt 3 ]; then
              echo "WARNING: Only $RUNNING/3 containers running"
              docker compose ps
              docker compose logs --tail=20
              exit 1
            fi
            echo "Deploy complete: ${{ github.sha }} ($RUNNING containers running)"
