name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push NanoClaw
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nanoclaw.Dockerfile
          push: true
          tags: |
            ghcr.io/alastrat/globalink-amz/nanoclaw:${{ github.sha }}
            ghcr.io/alastrat/globalink-amz/nanoclaw:latest

      - name: Build and push Inngest worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/inngest-worker.Dockerfile
          push: true
          tags: |
            ghcr.io/alastrat/globalink-amz/inngest-worker:${{ github.sha }}
            ghcr.io/alastrat/globalink-amz/inngest-worker:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << 'SSH_CONFIG'
          Host deploy-vps
            HostName ${{ secrets.VPS_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
          SSH_CONFIG
          sed -i 's/^          //' ~/.ssh/config

      - name: Sync files and deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          # Bundle all deploy files into a single tarball
          tar czf /tmp/deploy.tar.gz \
            docker-compose.yml \
            config/CLAUDE.md \
            tools/*.py \
            inngest/worker/lib/*.js \
            inngest/worker/functions/*.js

          # Create deploy script with rollback safety
          cat > /tmp/deploy.sh << 'SCRIPT'
          set -e

          rollback() {
            echo "ROLLBACK: Restoring systemd services..."
            cd /opt/globalink-fba && docker compose down 2>/dev/null || true
            systemctl enable nanoclaw.service 2>/dev/null || true
            systemctl start nanoclaw.service 2>/dev/null || true
            systemctl enable inngest.service 2>/dev/null || true
            systemctl start inngest.service 2>/dev/null || true
            cd /opt/inngest && docker compose up -d 2>/dev/null || true
            echo "ROLLBACK complete: systemd services restored"
            exit 1
          }

          # Extract synced files to their destinations
          cd /tmp && tar xzf deploy.tar.gz
          cp docker-compose.yml /opt/globalink-fba/
          cp config/CLAUDE.md /opt/nanoclaw/groups/owner/CLAUDE.md
          cp tools/*.py /opt/nanoclaw/groups/owner/tools/
          mkdir -p /opt/inngest/worker/lib /opt/inngest/worker/functions
          cp inngest/worker/lib/*.js /opt/inngest/worker/lib/
          cp inngest/worker/functions/*.js /opt/inngest/worker/functions/
          rm -rf /tmp/deploy.tar.gz /tmp/deploy.sh /tmp/docker-compose.yml /tmp/config /tmp/tools /tmp/inngest

          # Docker login to GHCR
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

          # Stop legacy services (systemd -> Docker transition)
          systemctl stop nanoclaw.service 2>/dev/null || true
          systemctl disable nanoclaw.service 2>/dev/null || true
          cd /opt/inngest && docker compose down 2>/dev/null || true
          systemctl stop inngest.service 2>/dev/null || true
          systemctl disable inngest.service 2>/dev/null || true

          # Deploy unified Docker stack
          cd /opt/globalink-fba
          docker compose pull nanoclaw inngest-worker
          docker compose up -d --remove-orphans
          docker image prune -f

          # Verify containers are running (rollback if not)
          sleep 8
          RUNNING=$(docker compose ps --format json | grep -c '"running"' || true)
          if [ "$RUNNING" -lt 3 ]; then
            echo "WARNING: Only $RUNNING/3 containers running"
            docker compose ps
            docker compose logs --tail=30
            rollback
          fi
          echo "Deploy complete: ${DEPLOY_SHA} ($RUNNING containers running)"
          SCRIPT

          # Transfer bundle + script in one SCP call (2 files, 1 connection)
          scp /tmp/deploy.tar.gz /tmp/deploy.sh deploy-vps:/tmp/

          # Execute deploy script via single SSH session
          ssh deploy-vps "GHCR_TOKEN='${GHCR_TOKEN}' GH_ACTOR='${GH_ACTOR}' DEPLOY_SHA='${DEPLOY_SHA}' bash /tmp/deploy.sh"
