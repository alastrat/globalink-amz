name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push NanoClaw
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nanoclaw.Dockerfile
          push: true
          tags: |
            ghcr.io/alastrat/globalink-amz/nanoclaw:${{ github.sha }}
            ghcr.io/alastrat/globalink-amz/nanoclaw:latest

      - name: Build and push Inngest worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/inngest-worker.Dockerfile
          push: true
          tags: |
            ghcr.io/alastrat/globalink-amz/inngest-worker:${{ github.sha }}
            ghcr.io/alastrat/globalink-amz/inngest-worker:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat > ~/.ssh/config << 'SSH_CONFIG'
          Host deploy-vps
            HostName ${{ secrets.VPS_HOST }}
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ConnectTimeout 30
            ServerAliveInterval 15
            ServerAliveCountMax 4
          SSH_CONFIG
          sed -i 's/^          //' ~/.ssh/config

      - name: Sync files and deploy
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          # Bundle all deploy files into a single tarball
          tar czf /tmp/deploy.tar.gz \
            docker-compose.yml \
            config/CLAUDE.md \
            tools/*.py tools/*.json tools/*.txt \
            inngest/worker/lib/*.js \
            inngest/worker/functions/*.js \
            inngest/worker/dashboard/*.html \
            inngest/worker/routes/*.js

          # Create deploy script with rollback safety
          cat > /tmp/deploy.sh << 'SCRIPT'
          set -e

          NANOCLAW_IMAGE="ghcr.io/alastrat/globalink-amz/nanoclaw:latest"
          NANOCLAW_CONTAINER="globalink-fba-nanoclaw"

          rollback() {
            echo "ROLLBACK: Restoring systemd services..."
            docker stop ${NANOCLAW_CONTAINER} 2>/dev/null || true
            docker rm ${NANOCLAW_CONTAINER} 2>/dev/null || true
            cd /opt/globalink-fba && docker compose down 2>/dev/null || true
            systemctl enable nanoclaw.service 2>/dev/null || true
            systemctl start nanoclaw.service 2>/dev/null || true
            systemctl enable inngest.service 2>/dev/null || true
            systemctl start inngest.service 2>/dev/null || true
            cd /opt/inngest && docker compose up -d 2>/dev/null || true
            echo "ROLLBACK complete: systemd services restored"
            exit 1
          }

          # Extract synced files to their destinations
          cd /tmp && tar xzf deploy.tar.gz
          cp docker-compose.yml /opt/globalink-fba/
          cp config/CLAUDE.md /opt/nanoclaw/groups/owner/CLAUDE.md
          cp tools/*.py tools/*.json tools/*.txt /opt/nanoclaw/groups/owner/tools/
          mkdir -p /opt/inngest/worker/lib /opt/inngest/worker/functions /opt/inngest/worker/dashboard /opt/inngest/worker/routes
          cp inngest/worker/lib/*.js /opt/inngest/worker/lib/
          cp inngest/worker/functions/*.js /opt/inngest/worker/functions/
          cp inngest/worker/dashboard/*.html /opt/inngest/worker/dashboard/
          cp inngest/worker/routes/*.js /opt/inngest/worker/routes/
          rm -rf /tmp/deploy.tar.gz /tmp/deploy.sh /tmp/docker-compose.yml /tmp/config /tmp/tools /tmp/inngest

          # Docker login to GHCR
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

          # Pull latest images
          docker pull ${NANOCLAW_IMAGE}
          cd /opt/globalink-fba && docker compose pull inngest-worker

          # Stop legacy services (systemd -> Docker transition, idempotent)
          systemctl stop nanoclaw.service 2>/dev/null || true
          systemctl disable nanoclaw.service 2>/dev/null || true
          cd /opt/inngest && docker compose down 2>/dev/null || true
          systemctl stop inngest.service 2>/dev/null || true
          systemctl disable inngest.service 2>/dev/null || true

          # Stop existing containers
          docker stop ${NANOCLAW_CONTAINER} 2>/dev/null || true
          docker rm ${NANOCLAW_CONTAINER} 2>/dev/null || true

          # Deploy Inngest via compose (server + worker)
          cd /opt/globalink-fba
          docker compose up -d --remove-orphans

          # Deploy NanoClaw via docker run (compose has signal propagation issues)
          docker run -d \
            --name ${NANOCLAW_CONTAINER} \
            --restart always \
            --env-file /opt/globalink-fba/.env.nanoclaw \
            --network globalink-fba_inngest \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /opt/nanoclaw/store:/opt/nanoclaw/store \
            -v /opt/nanoclaw/data:/opt/nanoclaw/data \
            -v /opt/nanoclaw/groups:/opt/nanoclaw/groups \
            -v /opt/nanoclaw/.env:/opt/nanoclaw/.env:ro \
            ${NANOCLAW_IMAGE}

          docker image prune -f

          # Verify all services are running (rollback if not)
          sleep 10
          NC_STATUS=$(docker inspect ${NANOCLAW_CONTAINER} --format "{{.State.Status}}" 2>/dev/null || echo "missing")
          COMPOSE_RUNNING=$(docker compose ps --format json | grep -c '"running"' || true)

          if [ "$NC_STATUS" != "running" ] || [ "$COMPOSE_RUNNING" -lt 2 ]; then
            echo "WARNING: NanoClaw=$NC_STATUS, Compose=$COMPOSE_RUNNING/2 running"
            docker logs ${NANOCLAW_CONTAINER} --tail=20 2>&1 || true
            docker compose ps
            rollback
          fi
          echo "Deploy complete: ${DEPLOY_SHA} (NanoClaw=$NC_STATUS, Inngest=$COMPOSE_RUNNING/2)"
          SCRIPT

          # Transfer bundle + script in one SCP call (2 files, 1 connection)
          scp /tmp/deploy.tar.gz /tmp/deploy.sh deploy-vps:/tmp/

          # Execute deploy script via single SSH session
          ssh deploy-vps "GHCR_TOKEN='${GHCR_TOKEN}' GH_ACTOR='${GH_ACTOR}' DEPLOY_SHA='${DEPLOY_SHA}' bash /tmp/deploy.sh"
