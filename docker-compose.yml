services:
  fba-agent:
    build: .
    container_name: fba-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - WHATSAPP_BRIDGE_URL=http://whatsapp-bridge:3001
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped

  whatsapp-bridge:
    build: ./whatsapp-bridge
    container_name: whatsapp-bridge
    ports:
      - "3001:3001"
    environment:
      - FBA_AGENT_URL=http://fba-agent:8000
      - OWNER_WHATSAPP_NUMBER=${OWNER_WHATSAPP_NUMBER}
      - ALLOWED_NUMBERS=${OWNER_WHATSAPP_NUMBER}
      - BRIDGE_PORT=3001
      - AUTH_DIR=/data/whatsapp-auth
    volumes:
      - whatsapp-auth:/data/whatsapp-auth
    restart: unless-stopped
    depends_on:
      - fba-agent

volumes:
  whatsapp-auth:
