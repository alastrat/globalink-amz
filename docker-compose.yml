# docker-compose.yml
# Full stack: NanoClaw + Inngest (server + worker)
# Deploy: runs on VPS at /opt/globalink-fba/
# Bind-mounts existing VPS paths for WhatsApp auth, groups, and IPC data.
# Run: docker compose up -d

  # NanoClaw is managed via 'docker run' (not compose) due to compose signal
  # propagation issues that cause immediate SIGTERM after start. See deploy.yml
  # for the docker run command that manages the nanoclaw container.

services:
  inngest-server:
    image: inngest/inngest:latest
    restart: always
    ports:
      - "127.0.0.1:8288:8288"
    environment:
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY:-local-fba-event-key}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY:-signkey-test-12345678}
    volumes:
      - inngest-data:/var/lib/inngest
    command: inngest dev -u http://inngest-worker:3500/api/inngest --no-discovery
    networks:
      - inngest

  inngest-worker:
    image: ghcr.io/alastrat/globalink-amz/inngest-worker:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/inngest-worker.Dockerfile
    restart: always
    environment:
      - INNGEST_DEV=1
      - INNGEST_BASE_URL=http://inngest-server:8288
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY:-local-fba-event-key}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY:-signkey-test-12345678}
      - TOOLS_DIR=/tools
      - IPC_DIR=/ipc/messages
      - CACHE_DIR=/cache
      - CHAT_JID=${CHAT_JID:-573002061607@s.whatsapp.net}
    volumes:
      - /opt/nanoclaw/groups/owner/tools:/tools:ro
      - /opt/nanoclaw/data:/opt/nanoclaw/data
      - /opt/nanoclaw/groups/owner/cache:/cache
    depends_on:
      - inngest-server
    networks:
      - inngest

volumes:
  inngest-data:

networks:
  inngest:
